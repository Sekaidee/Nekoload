<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; script-src 'self'; font-src 'self' data: https://fonts.gstatic.com;">
  <title>Nekoload</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <header class="titlebar" data-electron-drag>
      <span class="titlebar-title">Nekoload</span>
      <div class="titlebar-actions">
        <button type="button" class="titlebar-btn" data-action="minimize" title="Minimize">−</button>
        <button type="button" class="titlebar-btn" data-action="maximize" title="Maximize">□</button>
        <button type="button" class="titlebar-btn titlebar-btn-close" data-action="close" title="Close">×</button>
      </div>
    </header>

    <main class="content">
      <section class="input-section">
        <div class="input-row">
          <div class="input-wrap">
            <img src="neco-arc-neco.gif" class="input-gif" alt="" />
            <input
              type="text"
              id="urlInput"
              class="url-input"
              placeholder="Paste YouTube URL here…"
              autocomplete="off"
              spellcheck="false"
            />
            <div class="input-actions">
              <button type="button" id="btnPaste" class="action-btn action-btn-paste" title="Paste YouTube URL" aria-label="Paste" style="display: none;">
                <svg class="action-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
                  <rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>
                </svg>
                
              </button>
              <button type="button" id="btnAudio" class="action-btn action-btn-audio" title="Download audio">
                <svg class="action-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M9 18V5l12-2v13M9 9l12-2"/>
                  <circle cx="6" cy="18" r="3"/>
                  <circle cx="18" cy="16" r="3"/>
                </svg>
                <span class="action-btn-text">Audio</span>
              </button>
              <button type="button" id="btnVideo" class="action-btn action-btn-video" title="Download video">
                <svg class="action-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="2" y="4" width="20" height="16" rx="2"/>
                  <path d="m10 9 6 3-6 3V9z"/>
                </svg>
                <span class="action-btn-text">Video</span>
              </button>
            </div>
          </div>
          <button type="button" id="btnSettings" class="settings-btn" title="Settings" aria-label="Settings">
            <svg class="settings-btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3"/>
              <path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
            </svg>
          </button>
        </div>
      </section>

      <section class="downloads-section">
        <h2 class="downloads-heading">Downloads</h2>
        <div class="download-list-wrap">
          <div class="download-list-empty" id="downloadListEmpty" aria-hidden="false">
            <img src="Letsgo.png" alt="" />
          </div>
          <ul id="downloadList" class="download-list" aria-label="Download list"></ul>
        </div>
      </section>
    </main>
  </div>

  <template id="downloadItemTemplate">
    <li class="download-item" data-id="">
      <div class="download-item-media">
        <div class="download-item-type-icon" data-type="video" aria-hidden="true"></div>
        <div class="download-item-thumb">
          <img src="" alt="" class="download-thumb-img" onerror="this.style.display='none'; this.nextElementSibling?.classList.add('visible');">
          <div class="download-thumb-placeholder"><span>No thumb</span></div>
        </div>
      </div>
      <div class="download-item-body">
        <div class="download-item-title" title="">—</div>
        <div class="download-item-meta">
          <div class="download-progress-wrap">
            <div class="download-progress-bar" style="width: 0%"></div>
          </div>
          <div class="download-item-status">
            <span class="download-pct">0%</span>
            <span class="download-status-text">Waiting…</span>
          </div>
        </div>
      </div>
      <div class="download-item-actions">
        <button type="button" class="download-menu-btn" title="More actions" aria-haspopup="true">⋮</button>
        <button type="button" class="download-remove-btn" title="Remove from list" aria-label="Remove from list">×</button>
      </div>
    </li>
  </template>

  <div id="download-context-menu" class="download-menu-dropdown global-dropdown" hidden aria-hidden="true"></div>

  <script src="renderer.js"></script>
</body>
</html>
